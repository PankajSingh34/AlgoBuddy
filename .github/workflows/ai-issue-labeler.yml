name: Smart Issue Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  label-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo        # ← ADD THIS
        uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Label issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const fileContents = fs.readFileSync('.github/labeler.yml', 'utf8');
            const config = yaml.load(fileContents);
            
            const issue = context.payload.issue;
            const title = issue.title || '';
            const body = issue.body || '';
            
            let labelsToAdd = [];
            for (const [label, rules] of Object.entries(config)) {
              if (!rules) continue;
              for (const rule of rules) {
                if (rule.title && new RegExp(rule.title, 'i').test(title)) {
                  labelsToAdd.push(label);
                }
                if (rule.body && new RegExp(rule.body, 'i').test(body)) {
                  labelsToAdd.push(label);
                }
              }
            }
            
            labelsToAdd = [...new Set(labelsToAdd)];
            
            if (labelsToAdd.length > 0) {
              console.log('Adding labels:', labelsToAdd);
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd
              });
            }
